name: Build de test (Windows)

# Build Windows jetable, HORS PRODUCTION, a telecharger et lancer pour valider
# les changements avant publication. Il fait volontairement ceci :
#   - ne publie AUCUNE release GitHub ni aucun `latest.json`
#   - ne construit AUCUN artefact updater et ne demande AUCUN secret de signature
#   - reste donc INVISIBLE pour l'auto-updater (les utilisateurs ne le voient jamais)
# L'installateur n'est pas signe, donc Windows SmartScreen affiche "Editeur inconnu" :
# cliquez sur "Informations complementaires" -> "Executer quand meme" pour installer.
# Le gros pack runtime du premier lancement (navigateur + libs vectorielles + modele
# d'embedding) se telecharge toujours depuis la derniere release de production.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branche ou ref a compiler (vide = branche de lancement)"
        required: false
        default: ""
  push:
    branches:
      - "beta"
      - "test/**"

concurrency:
  group: test-build-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.2"

jobs:
  windows-test-installer:
    name: Windows test installer (unsigned, no auto-update)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Installer les dépendances frontend
        run: pnpm install --frozen-lockfile

      - name: Installer les dépendances backend
        run: cd backend && uv sync --dev

      - name: Installer le runtime Playwright Chromium
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PLAYWRIGHT_BROWSERS_PATH = "..\src-tauri\resources\bin\ms-playwright"
          cd backend
          uv run python -m playwright install chromium

      - name: Compiler le frontend
        run: pnpm build

      - name: Build backend sidecar
        run: pnpm build:sidecar

      # Actually start the frozen sidecar and wait for its FastAPI startup
      # handshake. This catches packaging bugs (missing bundled modules that
      # only surface in the frozen build) BEFORE we ship an installer.
      - name: Smoke-test sidecar startup
        run: pnpm smoke:sidecar

      - name: Package first-run runtime pack
        run: pnpm build:runtime-pack

      # createUpdaterArtifacts is forced off so no signing key is required and no
      # update metadata is produced — this build can never reach the updater.
      - name: Build unsigned Windows installer
        shell: bash
        run: pnpm exec tauri build --bundles nsis --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Locate installer
        id: find
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -File -Recurse |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) { throw "No NSIS installer found." }
          "installer=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Built installer: $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Juste Recrute Moi-test-windows-installer
          path: ${{ steps.find.outputs.installer }}
          retention-days: 14
          if-no-files-found: error

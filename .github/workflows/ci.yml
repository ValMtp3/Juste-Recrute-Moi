name: CI

on:
  push:
    branches:
      - main
      - codex-local-microservices
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.33.2"
  # pip-audit currently reports no fixed versions for these transitive ML advisories.
  # Keep the audit strict for all other packages; remove entries as upstream fixes land.
  PIP_AUDIT_IGNORE_VULNS: >-
    PYSEC-2024-277 PYSEC-2026-89
    PYSEC-2025-210 PYSEC-2025-194 PYSEC-2025-196 PYSEC-2025-195 PYSEC-2025-193 PYSEC-2025-192
    PYSEC-2026-139 PYSEC-2025-191 PYSEC-2025-197 PYSEC-2025-189 PYSEC-2025-190
    PYSEC-2025-217 PYSEC-2025-214 PYSEC-2025-218 PYSEC-2025-211 PYSEC-2025-212 PYSEC-2025-213
    PYSEC-2025-215 PYSEC-2025-216
  # glib 0.18 is pulled by the current Tauri/wry GTK stack. quick-xml < 0.41 is
  # still pinned by the latest Tauri plist/notification stack. Keep this scoped
  # and remove entries as upstream Tauri deps publish compatible fixes.
  CARGO_AUDIT_IGNORE_VULNS: >-
    RUSTSEC-2024-0429 RUSTSEC-2026-0194 RUSTSEC-2026-0195

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Audit frontend dependencies
        run: pnpm audit --audit-level=moderate

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Audit backend dependencies
        run: |
          cd backend
          uv sync --dev --frozen
          audit_args=()
          for vuln in $PIP_AUDIT_IGNORE_VULNS; do
            audit_args+=(--ignore-vuln "$vuln")
          done
          uv run --with pip-audit pip-audit "${audit_args[@]}"

      - uses: dtolnay/rust-toolchain@stable

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked
          cd src-tauri
          audit_args=()
          for vuln in $CARGO_AUDIT_IGNORE_VULNS; do
            audit_args+=(--ignore "$vuln")
          done
          cargo audit "${audit_args[@]}"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm version:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:behavioral
      - run: pnpm test:coverage
      - run: pnpm build

  website:
    name: Website
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v8.2.0
      - run: cd backend && uv sync --dev --frozen
      - run: cd backend && uv run ruff check .
      - run: cd backend && uv run mypy . --ignore-missing-imports
      - run: cd backend && uv run python -m pytest tests/test_import_boundaries.py -q
      - run: cd backend && uv run python -m pytest tests -q --cov=. --cov-report=term-missing --cov-fail-under=60

  release-smoke:
    name: Release smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            platform: linux
          - name: Windows
            os: windows-latest
            platform: windows
          - name: macOS
            os: macos-latest
            platform: macos
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            patchelf \
            wget

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Installer les dépendances frontend
        run: pnpm install --frozen-lockfile

      - name: Installer les dépendances backend
        run: cd backend && uv sync --dev --frozen

      - name: Run release smoke
        run: pnpm release:smoke

  backend-domains:
    name: Backend domain tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain:
          - core
          - data
          - profile
          - discovery
          - ranking
          - generation
          - api
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v8.2.0
      - run: cd backend && uv sync --dev --frozen
      - name: Run focused domain tests
        run: |
          cd backend
          files=$(ls tests/test_${{ matrix.domain }}*.py 2>/dev/null || true)
          if [ -n "$files" ]; then
            uv run python -m pytest tests/test_import_boundaries.py $files -q
          else
            uv run python -m pytest tests/test_import_boundaries.py -q
          fi

  rust:
    name: Rust check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            patchelf \
            wget
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - run: |
          triple=$(rustc -vV | grep 'host:' | awk '{print $2}')
          mkdir -p src-tauri/resources/backend
          touch "src-tauri/resources/backend/jhm-sidecar-next-${triple}"
          chmod +x "src-tauri/resources/backend/jhm-sidecar-next-${triple}"
          # Stub the bundled sidecar manifest so the exact-path bundle resource
          # in tauri.conf.json validates without a full sidecar build.
          echo '{"runtimePackVersion":""}' > src-tauri/resources/backend/sidecar-manifest.json
      - run: cd src-tauri && cargo test --lib
      - run: cd src-tauri && cargo check

name: Amélioration du scoring
description: Améliorer la qualité des offres, le score de fit, le matching sémantique ou l'apprentissage par feedback
title: "[Scoring] "
labels: ["ranker", "scoring"]
body:
  - type: textarea
    id: case
    attributes:
      label: Cas de scoring
      description: Fournissez un extrait d'offre anonymisé et le score ou classement attendu.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Comportement actuel
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

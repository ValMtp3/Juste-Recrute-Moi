name: Rapport de bug
description: Signaler un problème reproductible
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Résumé
      description: Que s'est-il passé ?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes de reproduction
      description: Utilisez seulement des données anonymisées. N'incluez aucune clé API ni aucun CV privé.
      placeholder: "1. Ouvrir...\n2. Lancer...\n3. Constater..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS / version de l'app
      placeholder: "Windows 11, Juste Recrute Moi v0.1"
